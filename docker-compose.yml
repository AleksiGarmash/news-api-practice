version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: newsdb
      POSTGRES_USER: newsuser
      POSTGRES_PASSWORD: newspass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/newsdb
      SPRING_DATASOURCE_USERNAME: newsuser
      SPRING_DATASOURCE_PASSWORD: newspass

volumes:
  postgres_data:
